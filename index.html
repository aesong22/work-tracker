<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 근무시간 트래커</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316a37f'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='2'/%3E%3Cline x1='16' y1='16' x2='16' y2='10' stroke='white' stroke-width='2.2' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='20.5' y2='18.5' stroke='white' stroke-width='2.2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='1.5' fill='white'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ff-sans:'Instrument Sans',sans-serif;
  --ff-mono:'JetBrains Mono',monospace;
  --green:#16a37f;--green-bg:#f0fdf8;--green-text:#0d7a5f;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --gray:#6b7280;--border:#e5e7eb;--border-strong:#d1d5db;
  --surface:#f9fafb;--card:#ffffff;
  --text:#111827;--text-sub:#6b7280;--text-hint:#9ca3af;
}
body{font-family:var(--ff-sans);color:var(--text);background:#f3f4f6;padding:2rem 1rem;}
.wrap{max-width:700px;margin:0 auto;padding:0;}
h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:1.25rem;letter-spacing:-.01em;}

.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.settings-label{font-size:12px;color:var(--text-sub);letter-spacing:.02em;}
.time-picker{display:flex;align-items:center;gap:3px;}
.time-select{appearance:none;-webkit-appearance:none;font-family:var(--ff-mono);font-size:13px;font-weight:500;color:var(--text);background:var(--card);border:1px solid var(--border-strong);border-radius:8px;padding:5px 8px;cursor:pointer;text-align:center;}
.time-select:hover{border-color:#9ca3af;background:#f9fafb;}
.time-select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.time-select.h{min-width:56px;} .time-select.m{min-width:50px;}
.time-sep{font-family:var(--ff-mono);font-size:13px;color:var(--text-hint);padding:0 1px;}
.reset-btn{margin-left:auto;font-family:var(--ff-sans);font-size:12px;color:var(--text-sub);background:var(--card);border:1px solid var(--border-strong);border-radius:8px;padding:5px 12px;cursor:pointer;transition:all .15s;}
.reset-btn:hover{color:var(--red);border-color:var(--red);background:var(--red-bg);}

.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.mode-btn{padding:.9rem 1.1rem;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;text-align:left;transition:all .15s;}
.mode-btn:hover{border-color:var(--border-strong);}
.mode-btn.active{border-color:var(--blue);background:var(--blue-bg);}
.mode-btn-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.mode-btn.active .mode-btn-title{color:var(--blue-text);}
.mode-btn-desc{font-size:11px;color:var(--text-sub);line-height:1.5;}
.mode-btn.active .mode-btn-desc{color:#3b82f6;}

.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.1rem;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.8rem 1rem;}
.stat-label{font-size:10px;font-weight:500;color:var(--text-hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:var(--ff-mono);font-size:17px;font-weight:500;color:var(--text);}
.stat-value.ok{color:var(--green);} .stat-value.warn{color:var(--amber);} .stat-value.over{color:var(--green);} .stat-value.short{color:var(--red);}
.stat-sub{font-size:10px;color:var(--text-hint);margin-top:3px;font-family:var(--ff-mono);}

.bar-wrap{margin-bottom:1.5rem;}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.bar-meta-label{font-size:11px;color:var(--text-hint);}
.bar-meta-pct{font-family:var(--ff-mono);font-size:12px;font-weight:500;color:var(--text-sub);}
.bar-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

.day-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:8px;}
.day-card.today{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,.2);}
.day-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.day-name{font-size:13px;font-weight:600;color:var(--text);min-width:42px;}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;letter-spacing:.02em;}
.badge-today{background:var(--blue-bg);color:var(--blue-text);}
.badge-fri{background:var(--green-bg);color:var(--green-text);}
.badge-burn{background:var(--amber-bg);color:#92400e;}
.off-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-hint);cursor:pointer;margin-left:auto;user-select:none;}
.off-toggle input{accent-color:var(--blue);cursor:pointer;}

.day-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start;}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-label{font-size:10px;font-weight:500;color:var(--text-hint);letter-spacing:.05em;text-transform:uppercase;}
.clear-btn{font-size:10px;color:var(--text-hint);background:none;border:none;cursor:pointer;padding:0;text-align:left;margin-top:2px;}
.clear-btn:hover{color:var(--red);}

.result-cell{text-align:right;padding-top:2px;}
.result-hours{font-family:var(--ff-mono);font-size:16px;font-weight:500;display:block;margin-bottom:4px;}
.result-retire{font-size:11px;color:var(--text-sub);line-height:1.7;}
.retire-time{font-family:var(--ff-mono);font-weight:500;font-size:13px;}
.retire-ok{color:var(--green);} .retire-short{color:var(--red);} .retire-over{color:var(--amber);}
.diff-tag{font-size:10px;display:block;}

/* 연차 */
.day-annual{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ann-label{font-size:10px;font-weight:500;color:var(--text-hint);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.annual-btns{display:flex;gap:4px;}
.ann-btn{font-family:var(--ff-mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;border:1px solid var(--border-strong);background:var(--card);color:var(--text-sub);cursor:pointer;transition:all .15s;}
.ann-btn:hover{border-color:#9ca3af;background:var(--surface);}
.ann-btn.active{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.ann-info{font-size:11px;color:var(--green-text);margin-left:2px;}

.day-bar-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.day-bar-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.day-bar-fill{height:100%;border-radius:99px;transition:width .3s;}
.day-bar-pct{font-family:var(--ff-mono);font-size:10px;color:var(--text-hint);min-width:30px;text-align:right;}

.day-off-overlay{opacity:.3;pointer-events:none;}
.save-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;opacity:0;transition:opacity .3s;vertical-align:middle;}
.save-dot.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
<h1>주간 근무시간 트래커</h1>

<div class="settings-card">
  <span class="settings-label">기본 출근 시간</span>
  <div class="time-picker">
    <select class="time-select h" id="def-in-h"></select>
    <span class="time-sep">:</span>
    <select class="time-select m" id="def-in-m"></select>
  </div>
  <span class="settings-label">으로 전체 설정</span>
  <button class="reset-btn" id="reset-btn">이번 주 초기화</button>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="mode-burn" onclick="setMode('burn')">
    <div class="mode-btn-title">월~목 불태우기</div>
    <div class="mode-btn-desc">월~목 집중 근무로 채우기 · 금요일 일찍 퇴근</div>
  </button>
  <button class="mode-btn" id="mode-even" onclick="setMode('even')">
    <div class="mode-btn-title">균등 근무</div>
    <div class="mode-btn-desc">월~금 매일 8h 균등 분배 · 동일한 퇴근 시간</div>
  </button>
</div>

<div class="summary-grid">
  <div class="stat"><div class="stat-label">월~목 합계</div><div class="stat-value" id="s-monthu">0h 0m</div></div>
  <div class="stat"><div class="stat-label">금요일 필요</div><div class="stat-value" id="s-fri-need">—</div></div>
  <div class="stat"><div class="stat-label">주간 합계</div><div class="stat-value" id="s-total">0h 0m</div><div class="stat-sub" id="s-target-sub"></div></div>
  <div class="stat"><div class="stat-label">금요일 퇴근 <span class="save-dot" id="save-dot"></span></div><div class="stat-value" id="s-fri">—</div></div>
</div>

<div class="bar-wrap">
  <div class="bar-meta">
    <span class="bar-meta-label">주간 진행률</span>
    <span class="bar-meta-pct" id="week-pct">0%</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="week-bar" style="width:0%;background:var(--blue);"></div></div>
</div>

<div id="days-container"></div>
</div>

<script>
const DAYS=[{key:'mon',label:'월요일'},{key:'tue',label:'화요일'},{key:'wed',label:'수요일'},{key:'thu',label:'목요일'},{key:'fri',label:'금요일'}];
const TARGET=40*60,LUNCH=60,LS_KEY='work_tracker';
let mode='burn',defaultIn='09:30';

function getWeekKey(){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}
function makeDefaultState(di){
  const burnOut=fromMin(toMin(di)+570);
  const evenOut=fromMin(toMin(di)+540);
  const defOut=mode==='even'?evenOut:burnOut;
  return{
    mon:{in:di,out:defOut,off:false,annual:0},
    tue:{in:di,out:defOut,off:false,annual:0},
    wed:{in:di,out:defOut,off:false,annual:0},
    thu:{in:di,out:defOut,off:false,annual:0},
    fri:{in:di,out:mode==='even'?evenOut:'',off:false,annual:0}
  };
}
let state=makeDefaultState(defaultIn);

function getDefOut(key){
  if(mode==='even')return fromMin(toMin(defaultIn)+540);
  return key==='fri'?'':fromMin(toMin(defaultIn)+570);
}

function loadLS(){
  try{
    const saved=localStorage.getItem(LS_KEY);if(!saved)return;
    const d=JSON.parse(saved);
    const thisWeek=getWeekKey();
    if(d.weekKey&&d.weekKey!==thisWeek){
      if(d.defaultIn)defaultIn=d.defaultIn;
      if(d.mode)mode=d.mode;
      state=makeDefaultState(defaultIn);
      DAYS.forEach(({key})=>{state[key].out=getDefOut(key);});
      saveLS();return;
    }
    if(d.mode)mode=d.mode;
    if(d.defaultIn)defaultIn=d.defaultIn;
    if(d.state)DAYS.forEach(({key})=>{if(d.state[key])Object.assign(state[key],d.state[key]);});
    // annual 필드 없는 이전 데이터 호환
    DAYS.forEach(({key})=>{if(state[key].annual===undefined)state[key].annual=0;});
  }catch(e){}
}
let saveTimer=null;
function saveLS(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({mode,defaultIn,weekKey:getWeekKey(),state}));
    const dot=document.getElementById('save-dot');
    if(dot){dot.classList.add('show');clearTimeout(saveTimer);saveTimer=setTimeout(()=>dot.classList.remove('show'),1400);}
  }catch(e){}
}

function pad(n){return String(n).padStart(2,'0');}
function toMin(hhmm){if(!hhmm)return null;const[h,m]=hhmm.split(':').map(Number);if(isNaN(h)||isNaN(m))return null;return h*60+m;}
function fromMin(min){if(min===null||min===undefined)return'—';return pad(Math.floor(min/60))+':'+pad(min%60);}
function workMin(a,b){if(a===null||b===null)return null;return Math.max(0,b-a-LUNCH);}
function fmtHM(min){if(min===null)return'—';const s=min<0?'-':'';const a=Math.abs(min);return s+Math.floor(a/60)+'h '+(a%60)+'m';}
function parseHM(hhmm){if(!hhmm)return{h:'',m:''};const[h,m]=hhmm.split(':');return{h:h||'',m:m||''};}
function buildTime(h,m){if(!h||m==='')return'';return h+':'+m;}

function makeHOpts(mn,mx,sel){
  let o='<option value="">—</option>';
  for(let h=mn;h<=mx;h++)o+=`<option value="${pad(h)}" ${sel===pad(h)?'selected':''}>${pad(h)}시</option>`;
  return o;
}
function makeMOpts(sel){
  let o='<option value="">—</option>';
  for(let m=0;m<60;m++)o+=`<option value="${pad(m)}" ${sel===pad(m)?'selected':''}>${pad(m)}분</option>`;
  return o;
}

function initSettings(){
  const p=parseHM(defaultIn);
  const hEl=document.getElementById('def-in-h');
  const mEl=document.getElementById('def-in-m');
  hEl.innerHTML=makeHOpts(8,10,p.h);
  mEl.innerHTML=makeMOpts(p.m);
  hEl.addEventListener('change',onDefChange);
  mEl.addEventListener('change',onDefChange);
  document.getElementById('reset-btn').addEventListener('click',()=>{
    if(!confirm('이번 주 데이터를 초기화할까요?'))return;
    state=makeDefaultState(defaultIn);
    DAYS.forEach(({key})=>{state[key].out=getDefOut(key);});
    saveLS();render();
  });
}
function onDefChange(){
  const h=document.getElementById('def-in-h').value;
  const m=document.getElementById('def-in-m').value;
  const t=buildTime(h,m);if(!t)return;
  defaultIn=t;
  DAYS.forEach(d=>{state[d.key].in=t;});
  saveLS();render();
}
function setMode(m2){
  mode=m2;
  document.getElementById('mode-burn').className='mode-btn'+(m2==='burn'?' active':'');
  document.getElementById('mode-even').className='mode-btn'+(m2==='even'?' active':'');
  DAYS.forEach(d=>{if(!state[d.key].off)state[d.key].out=getDefOut(d.key);});
  saveLS();render();
}

const todayIdx=[1,2,3,4,5].indexOf(new Date().getDay());


// effectiveTarget: 휴무일 수만큼 8h 차감한 이번 주 실제 근무 목표
// mt: 월~목 실제 근무 + 연차(유급이므로 포함)
// need: 금요일에 추가로 필요한 시간 (연차 포함)
function calcSummary(){
  let mt=0;
  let effectiveTarget=TARGET;

  ['mon','tue','wed','thu'].forEach(k=>{
    const s=state[k];
    if(s.off){effectiveTarget-=8*60;return;}
    const annualMins=(s.annual||0)*60;
    const w=workMin(toMin(s.in),toMin(s.out));
    mt+=annualMins+(w!==null?w:0);
  });

  const fs=state.fri;
  if(fs.off){
    effectiveTarget-=8*60;
  }
  const frAnnual=(fs.off?0:(fs.annual||0))*60;
  const fi=toMin(fs.in),fo=toMin(fs.out);
  const fridayWorked=(!fs.off&&fo!==null)?(workMin(fi,fo)??0):0;
  const fridayEffective=fridayWorked+frAnnual;

  const total=mt+fridayEffective;
  const need=Math.max(0,effectiveTarget-mt-frAnnual);
  const est=fs.off?null:(fi!==null&&need>0?fi+need+LUNCH:null);

  return{mt,total,need,est,effectiveTarget};
}

function render(){
  const c=document.getElementById('days-container');c.innerHTML='';
  const{need,est}=calcSummary();

  DAYS.forEach((d,i)=>{
    const s=state[d.key];
    const isFri=d.key==='fri',isToday=i===todayIdx;
    const inM=toMin(s.in),outM=toMin(s.out);
    const worked=s.off?null:workMin(inM,outM);
    const mOut=(isFri&&mode==='burn')?null:(mode==='even'?toMin(defaultIn)+540:toMin(defaultIn)+570);
    const annualMins=s.off?0:(s.annual||0)*60;
    const effectiveWorked=(worked!==null?worked:0)+annualMins;
    const pct=s.off?0:Math.min(100,Math.round(effectiveWorked/480*100));
    const barC=pct>=100?'var(--green)':pct>=75?'var(--blue)':'var(--amber)';

    // 결과 셀: 실제근무 표시 + 연차 뱃지
    let wDisp;
    if(s.off){
      wDisp=`<span class="result-hours" style="color:var(--text-hint)">휴무</span>`;
    }else if(s.annual===8&&worked===null){
      wDisp=`<span class="result-hours" style="color:var(--green-text)">연차 8h</span>`;
    }else{
      const hoursColor=effectiveWorked>=480?'var(--green)':'var(--amber)';
      const workedStr=worked!==null?`${Math.floor(worked/60)}h ${worked%60}m`:'—';
      const annTag=annualMins>0?`<span style="font-size:10px;display:block;color:var(--green-text)">+연차 ${s.annual}h</span>`:'';
      wDisp=`<span class="result-hours" style="color:${worked!==null?hoursColor:'var(--text-hint)'}">${workedStr}</span>${annTag}`;
    }

    let ret='';
    if(!s.off){
      if(isFri&&est!==null){
        const diff=outM!==null?outM-est:null;
        const cls=diff===null?'retire-ok':diff>5?'retire-over':diff<-5?'retire-short':'retire-ok';
        const extra=diff!==null&&Math.abs(diff)>1?(diff>0?`<span class="diff-tag" style="color:var(--amber)">+${diff}분 초과</span>`:`<span class="diff-tag" style="color:var(--red)">${Math.abs(diff)}분 부족</span>`):'';
        ret=`<div class="result-retire"><span style="color:var(--text-hint)">퇴근 목표</span><br><span class="retire-time ${cls}">${fromMin(est)}</span>${extra}</div>`;
      }else if(!isFri&&mOut!==null){
        const diff=outM!==null?outM-mOut:null;
        const cls=diff===null?'retire-ok':diff>5?'retire-over':diff<-5?'retire-short':'retire-ok';
        const extra=diff!==null&&Math.abs(diff)>1?(diff>0?`<span class="diff-tag" style="color:var(--amber)">+${diff}분 추가</span>`:`<span class="diff-tag" style="color:var(--red)">${Math.abs(diff)}분 부족</span>`):'';
        ret=`<div class="result-retire"><span style="color:var(--text-hint)">오늘 목표</span><br><span class="retire-time ${cls}">${fromMin(mOut)}</span>${extra}</div>`;
      }
    }

    const ip=parseHM(s.in),op=parseHM(s.out);
    let badges='';
    if(isToday)badges+=`<span class="badge badge-today">오늘</span>`;
    if(isFri)badges+=`<span class="badge badge-fri">금요일</span>`;
    if(!isFri&&mode==='burn')badges+=`<span class="badge badge-burn">추가근무</span>`;

    // 연차 버튼
    const annBtns=[0,2,4,8].map(h=>
      `<button class="ann-btn${(s.annual||0)===h?' active':''}" id="ann-${d.key}-${h}">${h===0?'없음':h+'h'}</button>`
    ).join('');
    const annInfo=annualMins>0?`<span class="ann-info">→ 이번 주 합계에 +${s.annual}h 반영</span>`:'';

    // 연차 8h일 때 시간 입력 영역 dim
    const timeOverlay=(!s.off&&s.annual===8)?'day-off-overlay':'';

    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':'');
    card.innerHTML=`
      <div class="day-header">
        <span class="day-name">${d.label}</span>${badges}
        <label class="off-toggle"><input type="checkbox" id="off-${d.key}" ${s.off?'checked':''} style="cursor:pointer"> 휴무</label>
      </div>
      <div id="body-${d.key}" class="${s.off?'day-off-overlay':''}">
        <div class="day-body ${timeOverlay}">
          <div class="field-group">
            <div class="field-label">출근</div>
            <div class="time-picker">
              <select class="time-select h" id="in-h-${d.key}">${makeHOpts(8,10,ip.h)}</select>
              <span class="time-sep">:</span>
              <select class="time-select m" id="in-m-${d.key}">${makeMOpts(ip.m)}</select>
            </div>
          </div>
          <div class="field-group">
            <div class="field-label">퇴근</div>
            <div class="time-picker">
              <select class="time-select h" id="out-h-${d.key}">${makeHOpts(16,22,op.h)}</select>
              <span class="time-sep">:</span>
              <select class="time-select m" id="out-m-${d.key}">${makeMOpts(op.m)}</select>
            </div>
            <button class="clear-btn" id="clr-${d.key}">지우기</button>
          </div>
          <div class="result-cell">${wDisp}${ret}</div>
        </div>
        <div class="day-annual">
          <span class="ann-label">연차</span>
          <div class="annual-btns">${annBtns}</div>
          ${annInfo}
        </div>
        <div class="day-bar-row">
          <div class="day-bar-track"><div class="day-bar-fill" style="width:${pct}%;background:${barC};"></div></div>
          <span class="day-bar-pct">${pct}%</span>
        </div>
      </div>`;
    c.appendChild(card);

    ['in','out'].forEach(t=>{
      card.querySelector(`#${t}-h-${d.key}`).addEventListener('change',()=>{
        const hv=document.getElementById(`${t}-h-${d.key}`).value;
        const mv=document.getElementById(`${t}-m-${d.key}`).value;
        state[d.key][t]=buildTime(hv,mv);saveLS();render();
      });
      card.querySelector(`#${t}-m-${d.key}`).addEventListener('change',()=>{
        const hv=document.getElementById(`${t}-h-${d.key}`).value;
        const mv=document.getElementById(`${t}-m-${d.key}`).value;
        state[d.key][t]=buildTime(hv,mv);saveLS();render();
      });
    });
    card.querySelector(`#clr-${d.key}`).addEventListener('click',()=>{state[d.key].out='';saveLS();render();});
    card.querySelector(`#off-${d.key}`).addEventListener('change',function(){state[d.key].off=this.checked;saveLS();render();});
    [0,2,4,8].forEach(h=>{
      card.querySelector(`#ann-${d.key}-${h}`).addEventListener('click',()=>{
        state[d.key].annual=h;saveLS();render();
      });
    });
  });
  updateSummary();
}

function updateSummary(){
  const{mt,need,est,total,effectiveTarget}=calcSummary();
  const fs=state.fri;
  document.getElementById('s-monthu').textContent=fmtHM(mt);
  const fn=document.getElementById('s-fri-need');
  if(fs.off){fn.textContent='휴무';fn.className='stat-value';}
  else if(need===0){fn.textContent='달성';fn.className='stat-value over';}
  else{fn.textContent=fmtHM(need);fn.className='stat-value '+(need<=480?'ok':'warn');}
  document.getElementById('s-total').textContent=fmtHM(total);
  document.getElementById('s-total').className='stat-value '+(total>=effectiveTarget?'over':'ok');
  // 목표가 40h보다 줄었을 때 sub에 표시
  const sub=document.getElementById('s-target-sub');
  sub.textContent=effectiveTarget<TARGET?`목표 ${Math.floor(effectiveTarget/60)}h`:'';
  const pct=Math.min(100,Math.round(total/effectiveTarget*100));
  const bar=document.getElementById('week-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'var(--green)':'var(--blue)';
  document.getElementById('week-pct').textContent=pct+'%';
  const fe=document.getElementById('s-fri');
  if(fs.off){fe.textContent='휴무';fe.className='stat-value';}
  else if(need===0){fe.textContent='이미 달성';fe.className='stat-value over';}
  else{fe.textContent=fromMin(est);fe.className='stat-value '+(est!==null&&est<=18*60+30?'ok':'warn');}
}

loadLS();
initSettings();
document.getElementById('mode-burn').className='mode-btn'+(mode==='burn'?' active':'');
document.getElementById('mode-even').className='mode-btn'+(mode==='even'?' active':'');
render();
</script>
</body>
</html>
